name: Build Windows VCI DLL

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Win32
            artifact: pico_j2534-win32
          - platform: x64
            artifact: pico_j2534-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure
        run: cmake -S windows_vci -B build/windows_vci-${{ matrix.platform }} -A ${{ matrix.platform }}

      - name: Build
        run: cmake --build build/windows_vci-${{ matrix.platform }} --config Release

      - name: Test DLL exports
        run: ctest --test-dir build/windows_vci-${{ matrix.platform }} -C Release --output-on-failure

      - name: Package release bundle
        shell: pwsh
        run: |
          $packageDir = "build/package/${{ matrix.artifact }}"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "build/windows_vci-${{ matrix.platform }}/Release/pico_j2534.dll" $packageDir
          Copy-Item "build/windows_vci-${{ matrix.platform }}/Release/vin_smoke_test.exe" $packageDir
          Compress-Archive -Path "$packageDir/*" -DestinationPath "build/package/${{ matrix.artifact }}.zip" -Force

      - name: Upload DLL and VIN smoke test
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/windows_vci-${{ matrix.platform }}/Release/pico_j2534.dll
            build/windows_vci-${{ matrix.platform }}/Release/vin_smoke_test.exe
            build/package/${{ matrix.artifact }}.zip

  release:
    name: Attach release artifacts
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: pico_j2534-*
          path: release-assets
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.zip
